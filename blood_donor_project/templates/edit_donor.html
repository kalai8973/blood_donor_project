{% extends 'base.html' %}

{% block title %}
Edit Donor
{% endblock %}

{% block content %}

<h2 style="text-align:center;color:#d32f2f;">Edit Donor</h2>

<form method="POST" style="width:500px;margin:auto;background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px lightgray;">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit"
        style="width:100%;padding:10px;background:#d32f2f;color:white;border:none;border-radius:5px;">
        Update Donor
    </button>

</form>

{% endblock %}
